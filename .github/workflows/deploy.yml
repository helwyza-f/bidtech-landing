name: Deploy BidTech Landing

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js application
        run: npm run build

      - name: Prepare application directory
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: mkdir -p /opt/bidtech-frontend

      - name: Upload application source
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: ".dockerignore,Dockerfile,app,components,lib,public,components.json,eslint.config.mjs,next-env.d.ts,next.config.ts,package.json,package-lock.json,postcss.config.mjs,proxy.ts,tsconfig.json"
          target: /opt/bidtech-frontend
          overwrite: true

      - name: Build and restart frontend container
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -e
            cd /opt/bidtech-frontend
            test -f /root/bidtech-frontend.env
            docker build -t bidtech-frontend:${{ github.sha }} .
            docker rm -f BidTech-Frontend 2>/dev/null || true
            docker run -d \
              --name BidTech-Frontend \
              --restart unless-stopped \
              --network bidtech-api \
              -p 127.0.0.1:3010:3000 \
              --env-file /root/bidtech-frontend.env \
              bidtech-frontend:${{ github.sha }}
            sleep 5
            wget -qO- http://127.0.0.1:3010/ >/dev/null
